services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      retries: 15

  app:
    build:
      context: ../..
      dockerfile: examples/chat/Dockerfile
    environment:
      CHAT_DB__DSN: postgres://postgres:postgres@db:5432/chat
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
