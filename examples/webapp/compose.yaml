services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 2s
      timeout: 2s
      retries: 20
    # Раскомментируйте, чтобы ходить в БД с хоста:
    # ports: ["5432:5432"]

  app:
    build:
      context: ../..
      dockerfile: examples/webapp/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/todo
    ports:
      - "${APP_PORT:-8080}:8080" # хост-порт: APP_PORT=18080 docker compose up
    depends_on:
      db:
        condition: service_healthy
